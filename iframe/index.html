<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Page</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        padding: 1.5rem;
        background: #fafafa;
        color: #1e293b;
      }

      h3 {
        margin: 0 0 0.75rem;
        color: #4338ca;
      }

      p {
        line-height: 1.6;
        color: #374151;
        margin: 0.5rem 0;
      }

      code {
        font-family: monospace;
        background: #e0e7ff;
        padding: 0.1em 0.35em;
        border-radius: 3px;
        font-size: 0.9em;
      }

      #status {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #6b7280;
      }

      .test-controls {
        margin-top: 1.25rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      button {
        padding: 0.4rem 0.85rem;
        border: 1px solid #6366f1;
        border-radius: 5px;
        background: #fff;
        color: #4338ca;
        font-size: 0.875rem;
        cursor: pointer;
      }

      button:hover {
        background: #eef2ff;
      }

      #extra-content {
        margin-top: 1rem;
      }

      .extra-block {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 6px;
        padding: 0.6rem 1rem;
        margin-top: 0.5rem;
        font-size: 0.875rem;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <h3>Iframe Content</h3>
    <p>
      This iframe sends its own height and mock API data to the parent window
      using <code>window.parent.postMessage</code>.
    </p>
    <p>
      The parent displays this data in the panel above the iframe.
    </p>
    <p id="status">Fetching data…</p>

    <div class="test-controls">
      <button id="btn-add">Add content block</button>
      <button id="btn-remove">Remove last block</button>
    </div>

    <div id="extra-content"></div>

    <script type="module" src="../src/iframe/main.ts"></script>
  </body>
</html>
