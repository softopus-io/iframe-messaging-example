name: Semgrep

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

jobs:
  semgrep:
    if: ${{ !github.event.pull_request.draft }}
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: '🤌 Checkout'
        uses: actions/checkout@v6

      - name: '🔍 Run Semgrep'
        id: semgrep
        continue-on-error: true
        run: |
          set +e
          # Run semgrep and capture output (image pull is handled by make semgrep)
          make semgrep 2>&1 | tee semgrep-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Always capture output for PR comment
          {
            echo 'findings<<EOF'
            cat semgrep-output.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: '💬 Post PR Comment'
        if: github.event_name == 'pull_request' && steps.semgrep.outputs.exit_code != '0'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: semgrep
          recreate: true
          message: |
            ## 🔍 Semgrep Security Findings

            ```
            ${{ steps.semgrep.outputs.findings }}
            ```

      - name: '❌ Fail if findings'
        if: steps.semgrep.outputs.exit_code != '0'
        run: |
          echo "Failing due to exit code: ${{ steps.semgrep.outputs.exit_code }}"
          exit 1
